name: prototipo_2
description: "Aplicación para gestión escolar."
publish_to: 'none'
# Android/iOS: version visible + build interno para las tiendas.
version: 0.9.0+1

# Panel administrativo web. Se incrementa de forma independiente a la app.
admin_web_version: 0.7.0+1

environment:
  sdk: ^3.7.2

dependencies:
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.8
  firebase_core: ^3.13.1
  firebase_database: ^11.3.7
  lottie: ^2.7.0
  package_info_plus: ^8.0.0
  yaml: ^3.1.3
  
  flutter:
    sdk: flutter
  flutter_localizations:   # Para soporte de idiomas
    sdk: flutter
  provider: ^6.1.4
  table_calendar: ^3.0.5 
  shared_preferences: ^2.5.3
  firebase_storage: ^12.4.10
  image_picker: ^1.1.2
  intl: ^0.20.2            # Para internacionalización y formatos de fecha/números
  lucide_flutter: ^1.25.0
  skeletonizer: ^2.1.3
  connectivity_plus: ^6.1.5

dev_dependencies:
  change_app_package_name: ^1.1.0
  flutter_launcher_icons: "^0.13.1"

  flutter_test:
    sdk: flutter
  
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    # El panel lee exclusivamente admin_web_version durante su arranque.
    - pubspec.yaml
     

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/play_store_512.png"
  adaptive_icon_foreground: "assets/icons/play_store_512.png"
